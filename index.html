<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Verification -->
    <meta
      name="google-site-verification"
      content="JGPjCVntGJ_UwvGLsJn_kfRIoM0fcwF4lIX_6Ywapk8"
    />

    <!-- Basic SEO -->
    <title>Mohammad Kaif's Travel Blog</title>

    <meta
      name="description"
      content="Explore inspiring travel stories, beautiful destinations, and unforgettable journeys.
Discover experiences, moments, and memories from adventures around the world.
A personal space to share travel inspiration, guides, and real travel experiences."
    />
    <meta
      name="keywords"
      content="travel blog, travel memories, travel photos, destinations, trip stories, Kaif travel blog, travel timeline, personal blog, Mohammad Kaif blog"
    />
    <meta name="author" content="Mohammad Kaif" />

    <!-- OPEN GRAPH -->
    <meta
      property="og:title"
      content="Kaif’s Travel Blog | Beautiful Destinations & Memories"
    />
    <meta
      property="og:description"
      content="Explore stunning destinations, trip stories, travel timelines, and beautiful memories from Kaif’s journeys."
    />
    <meta property="og:url" content="https://travel-blog-kaif.netlify.app/" />
    <meta property="og:type" content="website" />

    <!-- ⭐ Correct OG Image (JPG version you created) -->
    <meta
      property="og:image"
      content="https://travel-blog-kaif.netlify.app/og-image.jpg"
    />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- TWITTER CARD -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kaif’s Travel Blog" />
    <meta
      name="twitter:description"
      content="Discover beautiful destinations and personal travel memories."
    />
    <meta
      name="twitter:image"
      content="https://travel-blog-kaif.netlify.app/og-image.jpg"
    />
    <!-- ⭐ PERFORMANCE OPTIMIZATION: Preload & DNS Prefetch -->
    <!-- DNS Prefetch for external CDN -->
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />

    <!-- Preload critical images for faster initial render -->
    <link
      rel="preload"
      as="image"
      href="https://res.cloudinary.com/dv6boe8ig/image/upload/w_800,dpr_auto,q_85,f_auto/v1767075165/kaif_iaaei5.jpg"
      fetchpriority="high"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
